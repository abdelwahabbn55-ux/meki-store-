<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - مكي للخردوات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/main.css">
    <style>
        .admin-layout { display: flex; min-height: 100vh; }
        .admin-sidebar { width: 250px; background: var(--bg-alt); padding: 2rem; border-left: 1px solid rgba(255,255,255,0.05); }
        .admin-main { flex: 1; padding: 3rem; background: var(--bg); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .stat-card { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .product-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; }
        .product-table th, .product-table td { padding: 1.2rem; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .product-table th { background: rgba(255,255,255,0.02); color: var(--text-muted); font-weight: 400; font-size: 0.9rem; }
        .thumb { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.8rem; min-width: auto; }
        .btn-danger { background: #ff4757; color: white; }
        
        /* Modal for adding product */
        .admin-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 4000; padding: 1rem; }
        .admin-modal.active { display: flex; }
        .modal-body { background: var(--bg-alt); width: 100%; max-width: 600px; padding: 2.5rem; border-radius: 16px; position: relative; max-height: 90vh; overflow-y: auto; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    </style>
</head>
<body>
    <div class="admin-layout" id="admin-layout" style="display: none;">
        <aside class="admin-sidebar">
            <div class="logo" style="margin-bottom: 2.5rem;">مكي</div>
            <nav class="nav-links" style="display: flex; flex-direction: column; gap: 1rem; position: static; width: auto; height: auto; background: none;">
                <a href="#" class="active">المنتجات</a>
                <a href="#" id="logout-btn">تسجيل الخروج</a>
            </nav>
        </aside>
        <main class="admin-main">
            <header class="admin-header">
                <h1>إدارة المنتجات</h1>
                <button class="btn btn-primary" id="open-add-modal">+ إضافة منتج جديد</button>
            </header>

            <div class="stat-grid">
                <div class="stat-card">
                    <div class="text-muted">إجمالي المنتجات</div>
                    <div class="h2" id="total-count">0</div>
                </div>
            </div>

            <table class="product-table">
                <thead>
                    <tr>
                        <th>الصورة</th>
                        <th>الاسم (AR)</th>
                        <th>السعر</th>
                        <th>العمليات</th>
                    </tr>
                </thead>
                <tbody id="admin-product-list">
                    <!-- Products injected here -->
                </tbody>
            </table>
        </main>
    </div>

    <!-- Add Product Modal -->
    <div class="admin-modal" id="add-product-modal">
        <div class="modal-body">
            <button class="cart-close" id="close-add-modal" style="position: absolute; top: 1rem; left: 1rem;">&times;</button>
            <h2 style="margin-bottom: 2rem;">إضافة منتج جديد</h2>
            <form id="add-product-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>الاسم (العربية)</label>
                        <input type="text" id="name_ar" required>
                    </div>
                    <div class="form-group">
                        <label>Name (French)</label>
                        <input type="text" id="name_fr" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Name (English)</label>
                    <input type="text" id="name_en" required>
                </div>
                <div class="form-group">
                    <label>السعر (مثال: 4,500 DZD)</label>
                    <input type="text" id="price" required>
                </div>
                <div class="form-group">
                    <label>صورة المنتج</label>
                    <input type="file" id="product-image" accept="image/*" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="margin-top: 1rem;">حفظ المنتج</button>
            </form>
        </div>
    </div>

    <script type="module" src="src/admin.js"></script>
</body>
</html>
